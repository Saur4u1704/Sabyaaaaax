<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6 Years. 6 Universes.</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Typed JS -->
<script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
    margin:0;
    background:black;
    color:white;
    overflow-x:hidden;
    font-family: 'Segoe UI', sans-serif;
}

.section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}

/* Portal */
#portal{
    background: radial-gradient(circle, #1a1a2e, black);
}

.portal-circle{
    width:200px;
    height:200px;
    border-radius:50%;
    border:5px solid #00f5ff;
    box-shadow:0 0 40px #00f5ff;
    animation: glow 2s infinite alternate;
    cursor:pointer;
}

@keyframes glow{
    from{box-shadow:0 0 20px #00f5ff;}
    to{box-shadow:0 0 60px #00f5ff;}
}

/* Chat */
.chat-box{
    max-width:500px;
}

.bubble{
    background:#222;
    padding:10px 15px;
    border-radius:20px;
    margin:10px 0;
    display:inline-block;
}

/* Rain */
#storm{
    background:black;
    position:relative;
}

/* Gallery */
.gallery img{
    width:150px;
    height:150px;
    object-fit:cover;
    margin:10px;
    transition: transform 0.6s;
}

.gallery img:hover{
    transform: rotateY(180deg) scale(1.2);
}

/* Lock */
input{
    padding:10px;
    border-radius:10px;
    border:none;
    margin-top:10px;
}

/* Final */
#final{
    background:black;
}

#nameSky{
    font-size:50px;
    color:#ff00ff;
    display:none;
}

.counter{
    margin-top:20px;
    font-size:20px;
    color:#00f5ff;
}

</style>
</head>
<body>

<!-- 1 PORTAL -->
<section id="portal" class="section">
    <h1>In a world of billions... I found you.</h1>
    <div class="portal-circle mt-4"></div>
    <p class="mt-3">Click the portal</p>
</section>

<!-- 2 CHAT -->
<section id="chat" class="section" style="display:none;">
    <h2>Year One</h2>
    <div class="chat-box">
        <span id="typed"></span>
    </div>
</section>

<!-- 3 STORM -->
<section id="storm" class="section" style="display:none;">
    <h2>Even in storms... we stood strong.</h2>
    <button class="btn btn-light mt-3" id="sunriseBtn">Bring Sunrise</button>
</section>

<!-- 4 GALLERY -->
<section id="gallery" class="section" style="display:none;">
    <h2>Our Adventures</h2>
    <div class="gallery d-flex flex-wrap justify-content-center">
        <img src="https://picsum.photos/200?1">
        <img src="https://picsum.photos/200?2">
        <img src="https://picsum.photos/200?3">
    </div>
    <button class="btn btn-light mt-3 nextBtn">Next</button>
</section>

<!-- 5 LOCK -->
<section id="lock" class="section" style="display:none;">
    <h2>Only you can unlock this...</h2>
    <input type="text" id="secretInput" placeholder="Enter nickname">
    <button class="btn btn-light mt-3" id="unlockBtn">Unlock</button>
    <p id="error" style="color:red;"></p>
</section>

<!-- 6 FINAL -->
<section id="final" class="section" style="display:none;">
    <h1>Happy Birthday ❤️</h1>
    <div id="nameSky">HER NAME</div>
    <div class="counter" id="counter"></div>
</section>

<script>

// PORTAL CLICK
$('.portal-circle').click(function(){
    $('#portal').fadeOut(1000,function(){
        $('#chat').fadeIn(1000);
    });

    new Typed('#typed',{
        strings:[
            "Hey... remember our first conversation? 💬",
            "That random hi changed everything.",
            "6 years later... you're still my favorite person."
        ],
        typeSpeed:50,
        backSpeed:20,
        loop:false
    });

    setTimeout(()=>{
        $('#chat').fadeOut(1000,function(){
            $('#storm').fadeIn(1000);
        });
    },9000);
});

// SUNRISE BUTTON
$('#sunriseBtn').click(function(){
    $('#storm').css("background","linear-gradient(to top, orange, pink)");
    setTimeout(()=>{
        $('#storm').fadeOut(1000,function(){
            $('#gallery').fadeIn(1000);
        });
    },2000);
});

// NEXT BUTTON
$('.nextBtn').click(function(){
    $('#gallery').fadeOut(1000,function(){
        $('#lock').fadeIn(1000);
    });
});

// UNLOCK
$('#unlockBtn').click(function(){
    let val = $('#secretInput').val().toLowerCase();

    if(val === "bestie"){   // CHANGE THIS
        $('#lock').fadeOut(1000,function(){
            $('#final').fadeIn(1000);
        });

        $('#nameSky').fadeIn(2000);

        confetti({
            particleCount:200,
            spread:100
        });

        startCounter("2020-03-01"); // CHANGE DATE
    }else{
        $('#error').text("Hmm... try again 😉");
    }
});

// DAY COUNTER
function startCounter(startDate){
    let start = new Date(startDate);
    let now = new Date();
    let diff = now - start;

    let days = Math.floor(diff/(1000*60*60*24));
    let hours = Math.floor(diff/(1000*60*60));
    let minutes = Math.floor(diff/(1000*60));

    $('#counter').html(
        "You’ve made my life brighter for<br>"+
        days+" days<br>"+
        hours+" hours<br>"+
        minutes+" minutes"
    );
}

</script>

</body>
</html>
