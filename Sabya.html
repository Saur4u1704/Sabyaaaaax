<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6 Years. 6 Universes.</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
    margin:0;
    background:black;
    color:white;
    overflow-x:hidden;
    font-family: 'Segoe UI', sans-serif;
}

/* Moving Stars */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    background:url("https://i.imgur.com/YKY28eT.png");
    animation: moveStars 200s linear infinite;
    z-index:-1;
}

@keyframes moveStars{
    from{background-position:0 0;}
    to{background-position:-10000px 5000px;}
}

.section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}

/* Portal */
#portal{
    background: radial-gradient(circle, #1a1a2e, black);
}

.portal-circle{
    width:200px;
    height:200px;
    border-radius:50%;
    border:5px solid #00f5ff;
    box-shadow:0 0 40px #00f5ff;
    animation: glow 2s infinite alternate;
    cursor:pointer;
}

@keyframes glow{
    from{box-shadow:0 0 20px #00f5ff;}
    to{box-shadow:0 0 60px #00f5ff;}
}

/* Chat Bubble */
.bubble{
    background:#222;
    padding:10px 15px;
    border-radius:20px;
    margin:10px 0;
    display:inline-block;
    animation: fadeIn 1s ease-in;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* Floating Hearts */
.heart{
    position:fixed;
    color:#ff4d6d;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(100vh); opacity:1;}
    100%{transform:translateY(-10vh); opacity:0;}
}

/* Gallery */
.gallery img{
    width:150px;
    height:150px;
    object-fit:cover;
    margin:10px;
    transition: transform 0.6s;
}

.gallery img:hover{
    transform: rotateY(180deg) scale(1.2);
}

input{
    padding:10px;
    border-radius:10px;
    border:none;
    margin-top:10px;
}

#nameSky{
    font-size:50px;
    color:#ff00ff;
    display:none;
}

.counter{
    margin-top:20px;
    font-size:20px;
    color:#00f5ff;
}

h1,h2{
    text-shadow:0 0 15px pink;
}

</style>
</head>
<body>

<div class="stars"></div>

<!-- Background Music -->
<audio id="bgMusic" loop>
    <source src="music/romantic.mp3" type="audio/mpeg">
</audio>

<!-- 1 PORTAL -->
<section id="portal" class="section">
    <h1>In a world of billions... I found you.</h1>
    <div class="portal-circle mt-4"></div>
    <p class="mt-3">Click the portal ❤️</p>
</section>

<!-- 2 CHAT -->
<section id="chat" class="section" style="display:none;">
    <h2>Year One 💬</h2>
    <div id="chatArea"></div>
</section>

<!-- 3 STORM -->
<section id="storm" class="section" style="display:none;">
    <h2>Even in storms... we stood strong.</h2>
    <button class="btn btn-light mt-3" id="sunriseBtn">Bring Sunrise ☀️</button>
</section>

<!-- 4 GALLERY -->
<section id="gallery" class="section" style="display:none;">
    <h2>Gorgeous Arena 💖</h2>
    <div class="gallery d-flex flex-wrap justify-content-center">
        <img src="images/Photo1.png">
        <img src="images/Photo2.jpeg">
        <img src="images/Photo3.png">
        <img src="images/Photo4.png">
    </div>
    <button class="btn btn-light mt-3 nextBtn">Next ❤️</button>
</section>

<!-- 5 LOCK -->
<section id="lock" class="section" style="display:none;">
    <h2>Only you can unlock this... 🔐</h2>
    <input type="text" id="secretInput" placeholder="Enter nickname">
    <button class="btn btn-light mt-3" id="unlockBtn">Unlock</button>
    <p id="error" style="color:red;"></p>
</section>

<!-- 6 FINAL -->
<section id="final" class="section" style="display:none;">
    <h1>Happiest Birthday to youuuu ❤️</h1>
    <div id="nameSky"></div>
    <div class="counter" id="counter"></div>
</section>

<script>

// Floating Hearts
function createHeart(){
    let heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*20+15)+"px";
    document.body.appendChild(heart);
    setTimeout(()=>{heart.remove();},6000);
}
setInterval(createHeart,800);

// Portal Click
$('.portal-circle').click(function(){

    document.getElementById("bgMusic").play();

    $('#portal').fadeOut(1000,function(){
        $('#chat').fadeIn(2000);
    });

    let messages=[
        "Hey... remember our first conversation? 💬",
        "That random 'Hi' changed everything.",
        "I didn’t know that day...",
        "...you’d become my forever person ❤️",
        "6 years later... and I still choose you."
    ];

    let i=0;

    function showMessage(){
        if(i<messages.length){
            $('#chatArea').append("<div class='bubble'>"+messages[i]+"</div><br>");
            i++;
            setTimeout(showMessage,2000);
        }else{
            setTimeout(()=>{
                $('#chat').fadeOut(2000,function(){
                    $('#storm').fadeIn(2000);
                });
            },3000);
        }
    }

    showMessage();
});

// Sunrise
$('#sunriseBtn').click(function(){
    $('#storm').css("background","linear-gradient(to top, #ff9a9e, #fad0c4)");
    setTimeout(()=>{
        $('#storm').fadeOut(1000,function(){
            $('#gallery').fadeIn(1000);
        });
    },2000);
});

// Next
$('.nextBtn').click(function(){
    $('#gallery').fadeOut(1000,function(){
        $('#lock').fadeIn(1000);
    });
});

// Unlock
$('#unlockBtn').click(function(){
    let val=$('#secretInput').val().toLowerCase();

    if(val==="sabya"){
        $('#lock').fadeOut(1000,function(){
            $('#final').fadeIn(1000);
        });

        $('#nameSky').fadeIn(2000);

        confetti({
            particleCount:300,
            spread:150,
            origin:{y:0.6}
        });

        startLiveCounter("2020-03-01");
        typeFinalMessage();

    }else{
        $('#error').text("Hmm... only my queen knows this 😉");
    }
});

// Live Counter
function startLiveCounter(startDate){
    setInterval(()=>{
        let start=new Date(startDate);
        let now=new Date();
        let diff=now-start;

        let days=Math.floor(diff/(1000*60*60*24));
        let hours=Math.floor((diff/(1000*60*60))%24);
        let minutes=Math.floor((diff/(1000*60))%60);
        let seconds=Math.floor((diff/1000)%60);

        $('#counter').html(
            "Together for 💞<br>"+
            days+" days "+hours+" hours "+minutes+" minutes "+seconds+" seconds"
        );
    },1000);
}

// Final Message Typing
function typeFinalMessage(){
    new Typed('#nameSky',{
        strings:[
            "SABYA ❤️",
            "You are my today...",
            "...and all my tomorrows.",
            "Happy Birthday My Love 🎂❤️"
        ],
        typeSpeed:70,
        backSpeed:30,
        loop:false
    });
}

</script>

</body>
</html>
